<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danbri Ventas</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
    margin: 0;
    padding: 20px;
}

h1 {
    color: orange;
    font-size: 28px;
}

input {
    padding: 15px;
    font-size: 20px;
    width: 80%;
    max-width: 300px;
    margin: 10px 0;
}

button {
    padding: 15px;
    font-size: 18px;
    width: 80%;
    max-width: 300px;
    margin: 10px 0;
    background: orange;
    border: none;
    cursor: pointer;
}

.reset {
    background: red;
    color: white;
}

h2 {
    font-size: 26px;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>🔥 Danbri Ventas 🔥</h1>

<input type="number" id="venta" placeholder="Ingrese monto">
<br>

<input type="text" id="descripcion" placeholder="Descripción de la venta">
<br>

<button onclick="registrarVenta()">Registrar Venta</button>
<button class="reset" onclick="reiniciar()">Reiniciar</button>

<h2>Total: S/ <span id="total">0</span></h2>

<h2>Ventas realizadas: <span id="contador">0</span></h2>

<div id="listaVentas"></div>

<script>

// cargar datos
let ventas = JSON.parse(localStorage.getItem("ventasDanbri")) || [];
let siguienteId = parseInt(localStorage.getItem("siguienteIdDanbri")) || 1;

// calcular total
function calcularTotal() {
    return ventas.reduce((sum, v) => sum + v.monto, 0);
}

// obtener fecha y hora
function obtenerFechaHora() {
    let ahora = new Date();

    let fecha = ahora.toLocaleDateString("es-PE");
    let hora = ahora.toLocaleTimeString("es-PE", {
        hour: "2-digit",
        minute: "2-digit"
    });

    return { fecha, hora };
}

// mostrar datos
function renderizar() {
    document.getElementById("contador").innerText = ventas.length;
    document.getElementById("total").innerText = calcularTotal();

    let lista = document.getElementById("listaVentas");
    lista.innerHTML = "";

    ventas.forEach(v => {
        lista.innerHTML += `
        <div style="margin:5px; padding:10px; background:#222;">
            🧾 Venta #${v.id} - ${v.descripcion} - S/ ${v.monto}
            <br>
            📅 ${v.fecha} ⏰ ${v.hora}
            <br>
            <button onclick="editarVenta(${v.id})">Editar</button>
            <button onclick="eliminarVenta(${v.id})" style="background:red;color:white;">
                Eliminar
            </button>
        </div>`;
    });

    localStorage.setItem("ventasDanbri", JSON.stringify(ventas));
    localStorage.setItem("siguienteIdDanbri", siguienteId);
}

// registrar venta
function registrarVenta() {
    let valor = document.getElementById("venta").value;
    let descripcion = document.getElementById("descripcion").value;

    if (valor === "" || valor <= 0) {
        alert("Ingresa un monto válido");
        return;
    }

    if (descripcion.trim() === "") {
        alert("Ingresa una descripción");
        return;
    }

    let { fecha, hora } = obtenerFechaHora();

    let nuevaVenta = {
        id: siguienteId,
        monto: parseFloat(valor),
        descripcion: descripcion,
        fecha: fecha,
        hora: hora
    };

    siguienteId++;

    ventas.push(nuevaVenta);

    document.getElementById("venta").value = "";
    document.getElementById("descripcion").value = "";

    renderizar();
}

// editar venta
function editarVenta(id) {
    let venta = ventas.find(v => v.id === id);

    let nuevoMonto = prompt("Editar monto:", venta.monto);
    let nuevaDesc = prompt("Editar descripción:", venta.descripcion);

    if (nuevoMonto !== null && nuevoMonto > 0) {
        venta.monto = parseFloat(nuevoMonto);
    }

    if (nuevaDesc !== null && nuevaDesc.trim() !== "") {
        venta.descripcion = nuevaDesc;
    }

    renderizar();
}

// eliminar venta
function eliminarVenta(id) {
    if (confirm("¿Seguro que deseas eliminar esta venta?")) {
        ventas = ventas.filter(v => v.id !== id);
        renderizar();
    }
}

// reiniciar todo
function reiniciar() {
    if (confirm("¿Seguro que quieres reiniciar todo?")) {
        ventas = [];
        siguienteId = 1;
        localStorage.removeItem("ventasDanbri");
        localStorage.removeItem("siguienteIdDanbri");
        renderizar();
    }
}

// iniciar
renderizar();

</script>

</body>
</html>
