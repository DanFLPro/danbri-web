<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danbri Ventas</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
    margin: 0;
    padding: 20px;
}

h1 {
    color: orange;
    font-size: 28px;
}

input {
    padding: 15px;
    font-size: 20px;
    width: 80%;
    max-width: 300px;
    margin: 10px 0;
}

button {
    padding: 15px;
    font-size: 18px;
    width: 80%;
    max-width: 300px;
    margin: 10px 0;
    background: orange;
    border: none;
    cursor: pointer;
}

.reset {
    background: red;
    color: white;
}

h2 {
    font-size: 26px;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>🔥 Danbri Ventas 🔥</h1>

<input type="number" id="venta" placeholder="Ingrese monto">
<br>

<input type="text" id="descripcion" placeholder="Descripción (opcional)">
<br>

<button onclick="registrarVenta()">Registrar Venta</button>
<button class="reset" onclick="reiniciar()">Reiniciar</button>

<h2>Total: S/ <span id="total">0</span></h2>

<h2>Ventas realizadas: <span id="contador">0</span></h2>

<div id="listaVentas"></div>

<!-- 🔥 FIREBASE REAL -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCays-43OS8ExZZAmYPUJFOpTIG2YT_qi8",
    authDomain: "danbri-pos.firebaseapp.com",
    projectId: "danbri-pos",
    storageBucket: "danbri-pos.firebasestorage.app",
    messagingSenderId: "349089645220",
    appId: "1:349089645220:web:6802d3903b31a84be25c31"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.guardarEnFirebase = async (venta) => {
    try {
        await addDoc(collection(db, "ventas"), venta);
        console.log("🔥 Venta guardada en Firebase");
    } catch (e) {
        console.error("Firebase error:", e);
    }
};
</script>

<!-- 🔥 SISTEMA LOCAL DANBRI -->
<script>

let ventas = JSON.parse(localStorage.getItem("ventasDanbri")) || [];
let siguienteId = parseInt(localStorage.getItem("siguienteIdDanbri")) || 1;

function calcularTotal() {
    return ventas.reduce((sum, v) => sum + v.monto, 0);
}

function obtenerFechaHora() {
    let ahora = new Date();

    return {
        fecha: ahora.toLocaleDateString("es-PE"),
        hora: ahora.toLocaleTimeString("es-PE", {
            hour: "2-digit",
            minute: "2-digit"
        })
    };
}

function renderizar() {
    document.getElementById("contador").innerText = ventas.length;
    document.getElementById("total").innerText = calcularTotal();

    let lista = document.getElementById("listaVentas");
    lista.innerHTML = "";

    ventas.forEach(v => {
        lista.innerHTML += `
        <div style="margin:5px; padding:10px; background:#222;">
            🧾 Venta #${v.id} - ${v.descripcion} - S/ ${v.monto}
            <br>
            📅 ${v.fecha} ⏰ ${v.hora}
        </div>`;
    });

    localStorage.setItem("ventasDanbri", JSON.stringify(ventas));
    localStorage.setItem("siguienteIdDanbri", siguienteId);
}

function registrarVenta() {
    let valor = document.getElementById("venta").value;
    let descripcion = document.getElementById("descripcion").value;

    if (valor === "" || valor <= 0) {
        alert("Ingresa un monto válido");
        return;
    }

    if (descripcion.trim() === "") {
        descripcion = "Venta realizada";
    }

    let { fecha, hora } = obtenerFechaHora();

    let nuevaVenta = {
        id: siguienteId,
        monto: parseFloat(valor),
        descripcion,
        fecha,
        hora
    };

    siguienteId++;

    ventas.push(nuevaVenta);

    // 💾 LOCAL
    localStorage.setItem("ventasDanbri", JSON.stringify(ventas));
    localStorage.setItem("siguienteIdDanbri", siguienteId);

    // 🌐 FIREBASE
    if (typeof window.guardarEnFirebase === "function") {
        window.guardarEnFirebase(nuevaVenta);
    }

    document.getElementById("venta").value = "";
    document.getElementById("descripcion").value = "";

    renderizar();
}

function reiniciar() {
    if (confirm("¿Seguro que quieres reiniciar todo?")) {
        ventas = [];
        siguienteId = 1;
        localStorage.clear();
        renderizar();
    }
}

renderizar();

</script>

</body>
</html>
