<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danbri Ventas</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
    margin: 0;
    padding: 20px;
}

h1 {
    color: orange;
    font-size: 28px;
}

input {
    padding: 15px;
    font-size: 20px;
    width: 80%;
    max-width: 300px;
    margin: 10px 0;
}

button {
    padding: 15px;
    font-size: 18px;
    width: 80%;
    max-width: 300px;
    margin: 10px 0;
    background: orange;
    border: none;
    cursor: pointer;
}

.reset {
    background: red;
    color: white;
}

h2 {
    font-size: 26px;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>🔥 Danbri Ventas 🔥</h1>

<input type="number" id="venta" placeholder="Ingrese monto">
<br>

<input type="text" id="descripcion" placeholder="Descripción (opcional)">
<br>

<button onclick="registrarVenta()">Registrar Venta</button>
<button class="reset" onclick="reiniciarFirebase()">Reiniciar</button>

<h2>Total: S/ <span id="total">0</span></h2>
<h2>Ventas realizadas: <span id="contador">0</span></h2>

<div id="listaVentas"></div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, deleteDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCays-43OS8ExZZAmYPUJFOpTIG2YT_qi8",
    authDomain: "danbri-pos.firebaseapp.com",
    projectId: "danbri-pos",
    storageBucket: "danbri-pos.firebasestorage.app",
    messagingSenderId: "349089645220",
    appId: "1:349089645220:web:6802d3903b31a84be25c31"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ventasQuery = query(
    collection(db, "ventas"),
    orderBy("timestamp", "desc")
);

window.ventas = [];

/* 🔥 GUARDAR EN FIREBASE */
window.guardarEnFirebase = async (venta) => {
    try {
        await addDoc(collection(db, "ventas"), venta);
    } catch (e) {
        console.error(e);
    }
};

/* 🔥 TIEMPO REAL */
onSnapshot(ventasQuery, (snapshot) => {

    const datos = [];

    snapshot.forEach(doc => {
        datos.push(doc.data());
    });

    window.ventas = datos;
    renderizar();
});

/* 🔥 REINICIAR FIREBASE */
window.reiniciarFirebase = async () => {
    const snap = await getDocs(collection(db, "ventas"));

    snap.forEach(async (docItem) => {
        await deleteDoc(docItem.ref);
    });

    window.ventas = [];
    renderizar();
};

</script>

<!-- 🔥 LÓGICA -->
<script>

let dispositivo = localStorage.getItem("danbri_device");

if (!dispositivo) {
    dispositivo = prompt("Nombre del dispositivo (PC / Movil 1 / Movil 2):");
    localStorage.setItem("danbri_device", dispositivo);
}

function calcularTotal() {
    return (window.ventas || []).reduce((sum, v) => sum + v.monto, 0);
}

function renderizar() {

    let ventas = (window.ventas || []).sort((a, b) => b.timestamp - a.timestamp);

    document.getElementById("contador").innerText = ventas.length;
    document.getElementById("total").innerText = calcularTotal();

    let lista = document.getElementById("listaVentas");
    lista.innerHTML = "";

    ventas.forEach(v => {
        lista.innerHTML += `
        <div style="margin:5px; padding:10px; background:#222;">
            🧾 ${v.descripcion} - S/ ${v.monto} (${v.dispositivo || "Sin dispositivo"})
            <br>
            📅 ${v.fecha} ⏰ ${v.hora}
        </div>`;
    });
}

function obtenerFechaHora() {
    let ahora = new Date();

    return {
        fecha: ahora.toLocaleDateString("es-PE"),
        hora: ahora.toLocaleTimeString("es-PE", {
            hour: "2-digit",
            minute: "2-digit"
        }),
        timestamp: Date.now()
    };
}

function registrarVenta() {

    let valor = document.getElementById("venta").value;
    let descripcion = document.getElementById("descripcion").value;

    if (valor === "" || valor <= 0) {
        alert("Ingresa un monto válido");
        return;
    }

    if (descripcion.trim() === "") {
        descripcion = "Venta realizada";
    }

    let tiempo = obtenerFechaHora();

    let nuevaVenta = {
        monto: parseFloat(valor),
        descripcion,
        fecha: tiempo.fecha,
        hora: tiempo.hora,
        timestamp: tiempo.timestamp,
        dispositivo: dispositivo
    };

    window.guardarEnFirebase(nuevaVenta);

    document.getElementById("venta").value = "";
    document.getElementById("descripcion").value = "";
}

</script>

</body>
</html>
