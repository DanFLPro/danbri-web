<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danbri Ventas</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
    margin: 0;
    padding: 20px;
}

h1 {
    color: rgba(241, 80, 5, 0.966);
    font-size: 35px;
}

input {
    padding: 15px;
    font-size: 20px;
    width: 80%;
    max-width: 300px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
}

button {
    padding: 15px;
    font-size: 18px;
    width: 80%;
    max-width: 300px;
    margin: 10px 0;
    background: orange;
    border: none;
    cursor: pointer;
    border-radius: 8px;
    font-weight: bold;
}

.reset {
    background: red;
    color: white;
}

.cerrar-dia {
    background: #4CAF50;
    color: white;
}

.historial {
    background: #2196F3;
    color: white;
}

h2 {
    font-size: 32px;
    margin-top: 20px;
}

img {
    width: 70%;
    max-width: 300px;
    height: auto;
}

/* Pantalla de login */
.login-container {
    background: #1a1a1a;
    padding: 40px;
    border-radius: 20px;
    max-width: 400px;
    margin: 100px auto;
    box-shadow: 0 0 20px rgba(255,165,0,0.3);
}

.login-container h2 {
    margin-top: 0;
}

.error {
    color: #ff6b6b;
    margin-top: 10px;
}

/* Panel de ventas */
.ventas-panel {
    display: none;
}

/* Badge de usuario */
.user-badge {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(241, 80, 5, 0.966);
    padding: 10px 15px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    z-index: 100;
}

.user-badge:hover {
    background: rgba(241, 80, 5, 0.8);
}

/* Botones de acción */
.action-buttons {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

/* Modal de historial */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.8);
    overflow-y: auto;
}

.modal-content {
    background: #1a1a1a;
    margin: 50px auto;
    padding: 20px;
    border-radius: 20px;
    max-width: 600px;
    width: 90%;
    color: white;
    position: relative;
}

.modal-content h2 {
    color: orange;
    margin-top: 0;
}

.close-modal {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 30px;
    cursor: pointer;
    color: #888;
}

.close-modal:hover {
    color: white;
}

.cierre-item {
    background: #222;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    text-align: left;
    border-left: 4px solid #4CAF50;
}

.cierre-item span {
    color: orange;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- Pantalla de Login -->
<div id="loginScreen" class="login-container">
    <img src="imag/Logo Danbri.png" width="150">
    <h2>🔐 DANBRI POS</h2>
    <input type="text" id="loginUsuario" placeholder="Usuario">
    <br>
    <input type="password" id="loginPassword" placeholder="Contraseña">
    <br>
    <button onclick="iniciarSesion()">Ingresar</button>
    <div id="loginError" class="error"></div>
</div>

<!-- Panel Principal de Ventas -->
<div id="ventasPanel" class="ventas-panel">
    <div class="user-badge" onclick="cerrarSesion()">
        👤 <span id="userNameDisplay"></span> | 🚪 Salir
    </div>

    <img src="imag/Logo Danbri.png"> <br>
    <h1>🔥DANBRI Ventas🔥</h1>

    <div class="action-buttons">
        <input type="number" id="venta" placeholder="Ingrese monto">
        <input type="text" id="descripcion" placeholder="Descripción (opcional)">
        <button onclick="registrarVenta()">Registrar Venta</button>
        
        <div id="adminButtons" style="display:none;">
            <button class="cerrar-dia" onclick="cerrarDia()">📆 Cerrar día</button>
            <button class="historial" onclick="abrirHistorial()">📊 Historial de cierres</button>
            <button class="reset" onclick="reiniciarFirebase()">⚠️ Reiniciar TODAS las ventas</button>
        </div>
    </div>

    <h2>Total: S/ <span id="total">0</span></h2>
    <h2>Ventas realizadas: <span id="contador">0</span></h2>

    <div id="listaVentas"></div>
</div>

<!-- Modal de Historial -->
<div id="historialModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="cerrarHistorial()">&times;</span>
        <h2>📊 Historial de cierres</h2>
        <div id="listaCierres">
            <p style="color:#888;">Cargando historial...</p>
        </div>
        <button onclick="cerrarHistorial()" style="background:#555; width:auto; padding:10px 30px;">Cerrar</button>
    </div>
</div>

<script>
// ==================== USUARIOS ====================
const usuarios = {
    admin: { password: "admin123", rol: "admin", nombre: "Administrador" },
    daniel: { password: "1234", rol: "vendedor", nombre: "Daniel" },
    carlos: { password: "1234", rol: "vendedor", nombre: "Carlos" },
    maria: { password: "1234", rol: "vendedor", nombre: "María" }
};

// ==================== VARIABLES GLOBALES ====================
let db = null;
let usuarioActual = null;
let rolActual = null;
let unsubscribeVentas = null;
let ventas = [];
let ventasConId = [];

// ==================== INICIALIZAR FIREBASE ====================
async function iniciarFirebase() {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js");
    const { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, deleteDoc, updateDoc, doc } 
        = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js");
    
    const firebaseConfig = {
        apiKey: "AIzaSyCays-43OS8ExZZAmYPUJFOpTIG2YT_qi8",
        authDomain: "danbri-pos.firebaseapp.com",
        projectId: "danbri-pos",
        storageBucket: "danbri-pos.firebasestorage.app",
        messagingSenderId: "349089645220",
        appId: "1:349089645220:web:6802d3903b31a84be25c31"
    };
    
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    
    window.db = db;
    window.collection = collection;
    window.addDoc = addDoc;
    window.onSnapshot = onSnapshot;
    window.query = query;
    window.orderBy = orderBy;
    window.getDocs = getDocs;
    window.deleteDoc = deleteDoc;
    window.updateDoc = updateDoc;
    window.doc = doc;
}

// ==================== FUNCIONES PRINCIPALES ====================
function obtenerFechaHora() {
    let ahora = new Date();
    const dia = String(ahora.getDate()).padStart(2, '0');
    const mes = String(ahora.getMonth() + 1).padStart(2, '0');
    const año = ahora.getFullYear();
    return {
        fecha: `${dia}/${mes}/${año}`,
        hora: ahora.toLocaleTimeString("es-PE", { hour: "2-digit", minute: "2-digit" }),
        timestamp: Date.now()
    };
}

function calcularTotal() {
    return ventas.reduce((sum, v) => sum + (v.monto || 0), 0);
}

function renderizar() {
    let lista = document.getElementById("listaVentas");
    document.getElementById("contador").innerText = ventasConId.length;
    document.getElementById("total").innerText = calcularTotal();
    
    let usuarioMostrar = rolActual === "admin" ? "TODOS los vendedores" : `VENDEDOR: ${usuarioActual}`;
    lista.innerHTML = `<div style="margin-bottom:15px; padding:10px; background:#1a1a1a; border-radius:8px;">
        📋 Mostrando ventas de: <strong style="color:orange;">${usuarioMostrar}</strong>
    </div>`;
    
    if (ventasConId.length === 0) {
        lista.innerHTML += `<div style="padding:20px; color:#888;">No hay ventas para mostrar</div>`;
        return;
    }
    
    let ventasOrdenadas = [...ventasConId].sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    
    ventasOrdenadas.forEach(v => {
        let descripcionEscapada = (v.descripcion || "Venta").replace(/'/g, "\\'");
        let vendedorInfo = rolActual === "admin" ? `<br>👤 <span style="color:orange;">Vendedor: ${v.vendedor || "desconocido"}</span>` : "";
        
        lista.innerHTML += `
        <div style="margin:5px; padding:10px; background:#222; border-radius:8px;">
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                <div style="text-align:left;">
                    🧾 <strong>${v.descripcion || "Venta"}</strong> - S/ ${v.monto}${vendedorInfo}
                    <br>
                    📅 ${v.fecha || "fecha"} ⏰ ${v.hora || "hora"}
                </div>
                <div style="display:flex; gap:10px; margin-top:5px;">
                    <button onclick="editarVenta('${v.id}', ${v.monto}, '${descripcionEscapada}')" style="background:#ff9800; padding:5px 12px; font-size:14px; width:auto; border-radius:5px;">
                        ✏️ Editar
                    </button>
                    <button onclick="eliminarVenta('${v.id}')" style="background:#f44336; padding:5px 12px; font-size:14px; width:auto; border-radius:5px;">
                        🗑️ Eliminar
                    </button>
                </div>
            </div>
        </div>`;
    });
}

function cargarVentas() {
    if (unsubscribeVentas) {
        unsubscribeVentas();
    }
    
    const q = window.query(window.collection(window.db, "ventas"), window.orderBy("timestamp", "desc"));
    
    unsubscribeVentas = window.onSnapshot(q, (snapshot) => {
        const datos = [];
        const datosConId = [];
        
        snapshot.forEach(docSnap => {
            const data = docSnap.data();
            if (rolActual === "admin") {
                datos.push(data);
                datosConId.push({ id: docSnap.id, ...data });
            } else if (rolActual === "vendedor" && data.vendedor === usuarioActual) {
                datos.push(data);
                datosConId.push({ id: docSnap.id, ...data });
            }
        });
        
        ventas = datos;
        ventasConId = datosConId;
        renderizar();
    });
}

// ==================== CRUD OPERACIONES ====================
async function registrarVenta() {
    let valor = document.getElementById("venta").value;
    let descripcion = document.getElementById("descripcion").value;
    
    if (!usuarioActual) {
        alert("Error: Usuario no detectado");
        return;
    }
    
    if (valor === "" || parseFloat(valor) <= 0) {
        alert("Ingresa un monto válido");
        return;
    }
    
    if (descripcion.trim() === "") {
        descripcion = "Venta realizada";
    }
    
    let tiempo = obtenerFechaHora();
    
    let nuevaVenta = {
        monto: parseFloat(valor),
        descripcion: descripcion,
        fecha: tiempo.fecha,
        hora: tiempo.hora,
        timestamp: tiempo.timestamp,
        vendedor: usuarioActual
    };
    
    try {
        await window.addDoc(window.collection(window.db, "ventas"), nuevaVenta);
        document.getElementById("venta").value = "";
        document.getElementById("descripcion").value = "";
        alert("✅ Venta registrada correctamente");
    } catch (e) {
        console.error(e);
        alert("Error al guardar: " + e.message);
    }
}

async function editarVenta(id, montoActual, descripcionActual) {
    const venta = ventasConId.find(v => v.id === id);
    if (rolActual !== "admin" && (!venta || venta.vendedor !== usuarioActual)) {
        alert("No puedes editar esta venta");
        return;
    }
    
    let nuevoMonto = prompt("Nuevo monto:", montoActual);
    if (nuevoMonto === null || nuevoMonto === "" || nuevoMonto <= 0) {
        alert("Monto inválido");
        return;
    }
    
    let nuevaDescripcion = prompt("Nueva descripción:", descripcionActual);
    if (nuevaDescripcion === null || nuevaDescripcion.trim() === "") {
        nuevaDescripcion = "Venta realizada";
    }
    
    let tiempo = obtenerFechaHora();
    
    try {
        await window.updateDoc(window.doc(window.db, "ventas", id), {
            monto: parseFloat(nuevoMonto),
            descripcion: nuevaDescripcion,
            fecha: tiempo.fecha,
            hora: tiempo.hora,
            timestamp: tiempo.timestamp
        });
        alert("✅ Venta editada correctamente");
    } catch (e) {
        console.error(e);
        alert("Error al editar: " + e.message);
    }
}

async function eliminarVenta(id) {
    const venta = ventasConId.find(v => v.id === id);
    if (rolActual !== "admin" && (!venta || venta.vendedor !== usuarioActual)) {
        alert("No puedes eliminar esta venta");
        return;
    }
    
    const confirmar = confirm("⚠️ ¿Eliminar esta venta?");
    if (confirmar) {
        try {
            await window.deleteDoc(window.doc(window.db, "ventas", id));
            alert("✅ Venta eliminada correctamente");
        } catch (e) {
            console.error(e);
            alert("Error al eliminar: " + e.message);
        }
    }
}

// ==================== CERRAR DÍA CON ÚLTIMA FECHA REGISTRADA ====================
async function cerrarDia() {
    if (rolActual !== "admin") {
        alert("Solo el administrador puede cerrar el día.");
        return;
    }
    
    if (ventasConId.length === 0) {
        alert("No hay ventas registradas para cerrar el día.");
        return;
    }
    
    // Obtener todas las fechas distintas de las ventas
    let fechasUnicas = [...new Set(ventasConId.map(v => v.fecha || "sin fecha"))];
    fechasUnicas = fechasUnicas.filter(f => f !== "sin fecha").sort();
    
    if (fechasUnicas.length === 0) {
        alert("No hay ventas con fecha válida para cerrar.");
        return;
    }
    
    // La fecha más reciente es la última de la lista (ordenada)
    const fechaCerrar = fechasUnicas[fechasUnicas.length - 1];
    
    // Calcular total de las ventas de esa fecha
    const ventasDelDia = ventasConId.filter(v => v.fecha === fechaCerrar);
    const totalDelDia = ventasDelDia.reduce((sum, v) => sum + (v.monto || 0), 0);
    
    const confirmar = confirm(
        `⚠️ ¿Cerrar el día?\n\n📅 Fecha a cerrar: ${fechaCerrar}\n💰 Total del día: S/ ${totalDelDia}\n🧾 Ventas del día: ${ventasDelDia.length}\n\n📌 Ventas totales: ${ventasConId.length}\n📅 Fechas disponibles: ${fechasUnicas.join(", ")}\n\n¿Guardar este cierre y eliminar las ventas de ${fechaCerrar}?`
    );
    if (!confirmar) return;
    
    // 1. Guardar el cierre en Firebase
    const cierre = {
        fecha: fechaCerrar,
        totalVentas: ventasDelDia.length,
        montoTotal: totalDelDia,
        timestamp: Date.now()
    };
    
    try {
        await window.addDoc(window.collection(window.db, "cierres"), cierre);
        
        // 2. Eliminar las ventas de esa fecha
        const snapshot = await window.getDocs(window.collection(window.db, "ventas"));
        let eliminadas = 0;
        
        for (const docSnap of snapshot.docs) {
            const data = docSnap.data();
            if (data.fecha === fechaCerrar) {
                await window.deleteDoc(window.doc(window.db, "ventas", docSnap.id));
                eliminadas++;
            }
        }
        
        alert(`✅ Día ${fechaCerrar} cerrado correctamente.\n\n🗑️ Ventas eliminadas: ${eliminadas}\n💰 Total del día: S/ ${totalDelDia}`);
        location.reload();
        
    } catch (e) {
        console.error(e);
        alert("❌ Error al cerrar el día: " + e.message);
    }
}

// ==================== HISTORIAL DE CIERRES ====================
async function abrirHistorial() {
    if (rolActual !== "admin") {
        alert("Solo el administrador puede ver el historial.");
        return;
    }
    
    const modal = document.getElementById("historialModal");
    const lista = document.getElementById("listaCierres");
    modal.style.display = "block";
    lista.innerHTML = '<p style="color:#888;">Cargando historial...</p>';
    
    try {
        const snapshot = await window.getDocs(
            window.query(window.collection(window.db, "cierres"), window.orderBy("timestamp", "desc"))
        );
        
        if (snapshot.empty) {
            lista.innerHTML = '<p style="color:#888;">No hay cierres registrados aún.</p>';
            return;
        }
        
        let html = '';
        let totalGeneral = 0;
        let totalVentasGeneral = 0;
        
        snapshot.forEach(doc => {
            const data = doc.data();
            totalGeneral += data.montoTotal || 0;
            totalVentasGeneral += data.totalVentas || 0;
            
            html += `
                <div class="cierre-item">
                    📅 <strong>${data.fecha}</strong><br>
                    💰 Total: <span>S/ ${data.montoTotal || 0}</span><br>
                    🧾 Ventas: ${data.totalVentas || 0}
                </div>
            `;
        });
        
        html = `
            <div style="background:#1a3a1a; padding:15px; border-radius:8px; margin-bottom:20px; text-align:center;">
                <strong>📊 RESUMEN GENERAL</strong><br>
                💰 Total acumulado: <span style="color:orange; font-size:24px;">S/ ${totalGeneral}</span><br>
                🧾 Ventas totales: ${totalVentasGeneral}
            </div>
            ${html}
        `;
        
        lista.innerHTML = html;
        
    } catch (e) {
        console.error(e);
        lista.innerHTML = '<p style="color:red;">Error al cargar el historial</p>';
    }
}

function cerrarHistorial() {
    document.getElementById("historialModal").style.display = "none";
}

// ==================== REINICIAR FIREBASE ====================
async function reiniciarFirebase() {
    if (rolActual !== "admin") {
        alert("Solo el administrador puede reiniciar todas las ventas.");
        return;
    }
    
    const confirmar = confirm("⚠️ ¿Estás seguro de REINICIAR TODAS las ventas? Esta acción NO se puede deshacer.");
    if (!confirmar) return;
    
    try {
        const snapshot = await window.getDocs(window.collection(window.db, "ventas"));
        for (const docSnap of snapshot.docs) {
            await window.deleteDoc(window.doc(window.db, "ventas", docSnap.id));
        }
        alert("✅ Todas las ventas han sido eliminadas");
        location.reload();
    } catch (e) {
        console.error(e);
        alert("Error al reiniciar: " + e.message);
    }
}

// ==================== AUTENTICACIÓN ====================
function guardarSesion(usuario, password) {
    localStorage.setItem("danbri_usuario", usuario);
    localStorage.setItem("danbri_password", password);
}

function limpiarSesion() {
    localStorage.removeItem("danbri_usuario");
    localStorage.removeItem("danbri_password");
}

function verificarSesionGuardada() {
    const usuarioGuardado = localStorage.getItem("danbri_usuario");
    const passwordGuardada = localStorage.getItem("danbri_password");
    
    if (usuarioGuardado && passwordGuardada && usuarios[usuarioGuardado] && usuarios[usuarioGuardado].password === passwordGuardada) {
        return { usuario: usuarioGuardado, data: usuarios[usuarioGuardado] };
    }
    return null;
}

function iniciarSesionGlobal(usuario, rol, nombre) {
    usuarioActual = usuario;
    rolActual = rol;
    
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("ventasPanel").style.display = "block";
    document.getElementById("userNameDisplay").innerText = nombre;
    
    if (rolActual === "admin") {
        document.getElementById("adminButtons").style.display = "block";
    } else {
        document.getElementById("adminButtons").style.display = "none";
    }
    
    cargarVentas();
}

function cerrarSesion() {
    if (unsubscribeVentas) {
        unsubscribeVentas();
    }
    limpiarSesion();
    usuarioActual = null;
    rolActual = null;
    ventas = [];
    ventasConId = [];
    
    document.getElementById("loginScreen").style.display = "block";
    document.getElementById("ventasPanel").style.display = "none";
    document.getElementById("loginUsuario").value = "";
    document.getElementById("loginPassword").value = "";
}

async function iniciarSesion() {
    const usuario = document.getElementById("loginUsuario").value.trim().toLowerCase();
    const password = document.getElementById("loginPassword").value;
    const errorDiv = document.getElementById("loginError");
    
    if (usuarios[usuario] && usuarios[usuario].password === password) {
        guardarSesion(usuario, password);
        iniciarSesionGlobal(usuario, usuarios[usuario].rol, usuarios[usuario].nombre);
        errorDiv.innerText = "";
    } else {
        errorDiv.innerText = "❌ Usuario o contraseña incorrectos";
    }
}

// ==================== INICIO ====================
(async function init() {
    await iniciarFirebase();
    
    const sesion = verificarSesionGuardada();
    if (sesion) {
        iniciarSesionGlobal(sesion.usuario, sesion.data.rol, sesion.data.nombre);
    }
    
    window.registrarVenta = registrarVenta;
    window.editarVenta = editarVenta;
    window.eliminarVenta = eliminarVenta;
    window.reiniciarFirebase = reiniciarFirebase;
    window.cerrarDia = cerrarDia;
    window.abrirHistorial = abrirHistorial;
    window.cerrarHistorial = cerrarHistorial;
    window.iniciarSesion = iniciarSesion;
    window.cerrarSesion = cerrarSesion;
})();
</script>

</body>
</html>
