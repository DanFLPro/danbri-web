<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danbri Ventas</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
    margin: 0;
    padding: 20px;
}

h1 {
    color: orange;
    font-size: 28px;
}

input {
    padding: 15px;
    font-size: 20px;
    width: 80%;
    max-width: 300px;
    margin: 10px 0;
}

button {
    padding: 15px;
    font-size: 18px;
    width: 80%;
    max-width: 300px;
    margin: 10px 0;
    background: orange;
    border: none;
    cursor: pointer;
}

.reset {
    background: red;
    color: white;
}

h2 {
    font-size: 26px;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>🔥 Danbri Ventas 🔥</h1>

<input type="number" id="venta" placeholder="Ingrese monto">
<br>

<button onclick="registrarVenta()">Registrar Venta</button>
<button class="reset" onclick="reiniciar()">Reiniciar</button>

<h2>Total: S/ <span id="total">0</span></h2>

<script>

// Cargar datos guardados
let total = localStorage.getItem("totalDanbri");

if (total === null) {
    total = 0;
} else {
    total = parseFloat(total);
}

// Mostrar al cargar
document.getElementById("total").innerText = total;

// Registrar venta
function registrarVenta() {
    let valor = document.getElementById("venta").value;

    if (valor === "" || valor <= 0) {
        alert("Ingresa un monto válido");
        return;
    }

    total += parseFloat(valor);

    // Guardar en memoria
    localStorage.setItem("totalDanbri", total);

    document.getElementById("total").innerText = total;
    document.getElementById("venta").value = "";
}

// Reiniciar
function reiniciar() {
    if (confirm("¿Seguro que quieres reiniciar el total?")) {
        total = 0;
        localStorage.setItem("totalDanbri", total);
        document.getElementById("total").innerText = total;
    }
}

</script>

</body>
</html>
