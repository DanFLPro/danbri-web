<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danbri Ventas</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
    margin: 0;
    padding: 20px;
}

h1 {
    color: rgba(241, 80, 5, 0.966);
    font-size: 35px;
}

input {
    padding: 15px;
    font-size: 20px;
    width: 80%;
    max-width: 300px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
}

button {
    padding: 15px;
    font-size: 18px;
    width: 80%;
    max-width: 300px;
    margin: 10px 0;
    background: orange;
    border: none;
    cursor: pointer;
    border-radius: 8px;
    font-weight: bold;
}

.reset {
    background: red;
    color: white;
}

h2 {
    font-size: 32px;
    margin-top: 20px;
}

img {
    width: 70%;
    max-width: 300px;
    height: auto;
}

/* Pantalla de login */
.login-container {
    background: #1a1a1a;
    padding: 40px;
    border-radius: 20px;
    max-width: 400px;
    margin: 100px auto;
    box-shadow: 0 0 20px rgba(255,165,0,0.3);
}

.login-container h2 {
    margin-top: 0;
}

.error {
    color: #ff6b6b;
    margin-top: 10px;
}

/* Panel de ventas (oculto al inicio) */
.ventas-panel {
    display: none;
}

/* Badge de usuario */
.user-badge {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(241, 80, 5, 0.966);
    padding: 10px 15px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    z-index: 100;
}

.user-badge:hover {
    background: rgba(241, 80, 5, 0.8);
}

/* Botones de acción */
.action-buttons {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}
</style>
</head>

<body>

<!-- Pantalla de Login -->
<div id="loginScreen" class="login-container">
    <img src="imag/Logo Danbri.png" width="150">
    <h2>🔐 DANBRI POS</h2>
    <input type="text" id="loginUsuario" placeholder="Usuario">
    <br>
    <input type="password" id="loginPassword" placeholder="Contraseña">
    <br>
    <button onclick="iniciarSesion()">Ingresar</button>
    <div id="loginError" class="error"></div>
</div>

<!-- Panel Principal de Ventas (oculto al inicio) -->
<div id="ventasPanel" class="ventas-panel">
    <div class="user-badge" onclick="cerrarSesion()">
        👤 <span id="userNameDisplay"></span> | 🚪 Salir
    </div>

    <img src="imag/Logo Danbri.png"> <br>
    <h1>🔥 DANBRI Ventas 🔥</h1>

    <div class="action-buttons">
        <input type="number" id="venta" placeholder="Ingrese monto">
        <input type="text" id="descripcion" placeholder="Descripción (opcional)">
        <button onclick="registrarVenta()">Registrar Venta</button>
        
        <div id="adminButtons" style="display:none;">
            <button class="reset" onclick="reiniciarFirebase()">Reiniciar TODAS las ventas</button>
        </div>
    </div>

    <h2>Total: S/ <span id="total">0</span></h2>
    <h2>Ventas realizadas: <span id="contador">0</span></h2>

    <div id="listaVentas"></div>
</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, deleteDoc, updateDoc, doc, where } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCays-43OS8ExZZAmYPUJFOpTIG2YT_qi8",
    authDomain: "danbri-pos.firebaseapp.com",
    projectId: "danbri-pos",
    storageBucket: "danbri-pos.firebasestorage.app",
    messagingSenderId: "349089645220",
    appId: "1:349089645220:web:6802d3903b31a84be25c31"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;

let usuarioActual = null;
let rolActual = null;

/* 🔥 USUARIOS PREDEFINIDOS */
const usuarios = {
    admin: { password: "admin123", rol: "admin", nombre: "Administrador" },
    daniel: { password: "1234", rol: "vendedor", nombre: "Daniel" },
    carlos: { password: "1234", rol: "vendedor", nombre: "Carlos" },
    maria: { password: "1234", rol: "vendedor", nombre: "María" }
};

window.ventas = [];
window.ventasConId = [];

/* 🔥 FUNCIÓN PARA CARGAR VENTAS SEGÚN ROL */
function cargarVentas() {
    let q;
    
    if (rolActual === "admin") {
        // Admin ve TODAS las ventas
        q = query(collection(db, "ventas"), orderBy("timestamp", "desc"));
    } else {
        // Vendedor ve solo SUS ventas
        q = query(
            collection(db, "ventas"), 
            where("vendedor", "==", usuarioActual),
            orderBy("timestamp", "desc")
        );
    }
    
    return onSnapshot(q, (snapshot) => {
        const datos = [];
        const datosConId = [];

        snapshot.forEach(doc => {
            datos.push(doc.data());
            datosConId.push({
                id: doc.id,
                ...doc.data()
            });
        });

        window.ventas = datos;
        window.ventasConId = datosConId;
        
        if (typeof renderizar === 'function') {
            renderizar();
        }
    });
}

/* 🔥 GUARDAR EN FIREBASE */
window.guardarEnFirebase = async (venta) => {
    try {
        await addDoc(collection(db, "ventas"), venta);
    } catch (e) {
        console.error(e);
    }
};

/* 🔥 ELIMINAR VENTA */
window.eliminarVenta = async (id) => {
    try {
        await deleteDoc(doc(db, "ventas", id));
    } catch (e) {
        console.error(e);
    }
};

/* 🔥 EDITAR VENTA */
window.editarVenta = async (id, nuevoMonto, nuevaDescripcion) => {
    try {
        const tiempoActual = obtenerFechaHoraGlobal();
        await updateDoc(doc(db, "ventas", id), {
            monto: parseFloat(nuevoMonto),
            descripcion: nuevaDescripcion,
            fecha: tiempoActual.fecha,
            hora: tiempoActual.hora,
            timestamp: tiempoActual.timestamp
        });
    } catch (e) {
        console.error(e);
    }
};

/* 🔥 REINICIAR FIREBASE (SOLO ADMIN) */
window.reiniciarFirebase = async () => {
    if (rolActual !== "admin") {
        alert("Solo el administrador puede reiniciar todas las ventas.");
        return;
    }
    
    const confirmar = confirm("⚠️ ¿Estás seguro de REINICIAR TODAS las ventas? Esta acción NO se puede deshacer.");
    
    if (!confirmar) {
        return;
    }

    const snap = await getDocs(collection(db, "ventas"));
    for (const docItem of snap.docs) {
        await deleteDoc(docItem.ref);
    }

    window.ventas = [];
    window.ventasConId = [];
    if (typeof renderizar === 'function') {
        renderizar();
    }
};

function obtenerFechaHoraGlobal() {
    let ahora = new Date();
    return {
        fecha: ahora.toLocaleDateString("es-PE"),
        hora: ahora.toLocaleTimeString("es-PE", { hour: "2-digit", minute: "2-digit" }),
        timestamp: Date.now()
    };
}

window.obtenerFechaHoraGlobal = obtenerFechaHoraGlobal;
window.iniciarSesionGlobal = (usuario, rol, nombre) => {
    usuarioActual = usuario;
    rolActual = rol;
    
    // Mostrar panel de ventas
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("ventasPanel").style.display = "block";
    document.getElementById("userNameDisplay").innerText = nombre;
    
    // Mostrar botones de admin si corresponde
    if (rolActual === "admin") {
        document.getElementById("adminButtons").style.display = "block";
    } else {
        document.getElementById("adminButtons").style.display = "none";
    }
    
    // Iniciar carga de ventas
    cargarVentas();
};

window.cerrarSesionGlobal = () => {
    usuarioActual = null;
    rolActual = null;
    document.getElementById("loginScreen").style.display = "block";
    document.getElementById("ventasPanel").style.display = "none";
    document.getElementById("loginUsuario").value = "";
    document.getElementById("loginPassword").value = "";
};

</script>

<!-- 🔥 LÓGICA PRINCIPAL -->
<script>

function iniciarSesion() {
    const usuario = document.getElementById("loginUsuario").value.trim().toLowerCase();
    const password = document.getElementById("loginPassword").value;
    const errorDiv = document.getElementById("loginError");
    
    // Verificar credenciales
    if (window.usuarios && window.usuarios[usuario] && window.usuarios[usuario].password === password) {
        const userData = window.usuarios[usuario];
        window.iniciarSesionGlobal(usuario, userData.rol, userData.nombre);
        errorDiv.innerText = "";
    } else {
        errorDiv.innerText = "❌ Usuario o contraseña incorrectos";
    }
}

function cerrarSesion() {
    window.cerrarSesionGlobal();
}

function calcularTotal() {
    return (window.ventas || []).reduce((sum, v) => sum + v.monto, 0);
}

function editarVentaLocal(id, montoActual, descripcionActual) {
    let nuevoMonto = prompt("Nuevo monto:", montoActual);
    if (nuevoMonto === null || nuevoMonto === "" || nuevoMonto <= 0) {
        alert("Monto inválido");
        return;
    }
    
    let nuevaDescripcion = prompt("Nueva descripción:", descripcionActual);
    if (nuevaDescripcion === null || nuevaDescripcion.trim() === "") {
        nuevaDescripcion = "Venta realizada";
    }
    
    window.editarVenta(id, nuevoMonto, nuevaDescripcion);
}

function renderizar() {
    let ventasConId = (window.ventasConId || []).sort((a, b) => b.timestamp - a.timestamp);
    let usuarioMostrar = window.rolActual === "admin" ? "TODOS" : window.usuarioActual;

    document.getElementById("contador").innerText = ventasConId.length;
    document.getElementById("total").innerText = calcularTotal();

    let lista = document.getElementById("listaVentas");
    lista.innerHTML = `<div style="margin-bottom:10px;">📋 Mostrando ventas de: <strong>${usuarioMostrar}</strong></div>`;

    ventasConId.forEach(v => {
        let descripcionEscapada = (v.descripcion || "").replace(/'/g, "\\'");
        let vendedorInfo = window.rolActual === "admin" ? `<br>👤 Vendedor: ${v.vendedor || "desconocido"}` : "";
        
        lista.innerHTML += `
        <div style="margin:5px; padding:10px; background:#222; border-radius:8px;">
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                <div style="text-align:left;">
                    🧾 <strong>${v.descripcion || "Venta"}</strong> - S/ ${v.monto}${vendedorInfo}
                    <br>
                    📅 ${v.fecha} ⏰ ${v.hora}
                </div>
                <div style="display:flex; gap:10px; margin-top:5px;">
                    <button onclick="editarVentaLocal('${v.id}', ${v.monto}, '${descripcionEscapada}')" style="background:#ff9800; padding:5px 12px; font-size:14px; width:auto; border-radius:5px;">
                        ✏️ Editar
                    </button>
                    <button onclick="eliminarVentaLocal('${v.id}')" style="background:#f44336; padding:5px 12px; font-size:14px; width:auto; border-radius:5px;">
                        🗑️ Eliminar
                    </button>
                </div>
            </div>
        </div>`;
    });
}

function eliminarVentaLocal(id) {
    const confirmar = confirm("⚠️ ¿Eliminar esta venta?");
    if (confirmar) {
        window.eliminarVenta(id);
    }
}

function registrarVenta() {
    let valor = document.getElementById("venta").value;
    let descripcion = document.getElementById("descripcion").value;

    if (valor === "" || parseFloat(valor) <= 0) {
        alert("Ingresa un monto válido");
        return;
    }

    if (descripcion.trim() === "") {
        descripcion = "Venta realizada";
    }

    let tiempo = window.obtenerFechaHoraGlobal();

    let nuevaVenta = {
        monto: parseFloat(valor),
        descripcion: descripcion,
        fecha: tiempo.fecha,
        hora: tiempo.hora,
        timestamp: tiempo.timestamp,
        vendedor: window.usuarioActual  // 🔥 Guardamos quién registró la venta
    };

    window.guardarEnFirebase(nuevaVenta);

    document.getElementById("venta").value = "";
    document.getElementById("descripcion").value = "";
}

// Exponer funciones globalmente
window.editarVentaLocal = editarVentaLocal;
window.eliminarVentaLocal = eliminarVentaLocal;
window.registrarVenta = registrarVenta;
window.renderizar = renderizar;
window.calcularTotal = calcularTotal;
window.usuarios = {
    admin: { password: "admin123", rol: "admin", nombre: "Administrador" },
    daniel: { password: "1234", rol: "vendedor", nombre: "Daniel" },
    carlos: { password: "1234", rol: "vendedor", nombre: "Carlos" },
    maria: { password: "1234", rol: "vendedor", nombre: "María" }
};
window.usuarioActual = null;
window.rolActual = null;

</script>

</body>
</html>
